
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পরিসংখ্যান মাস্টার কুইজ</title>
    
    <!-- Google Fonts: Hind Siliguri -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MathJax for LaTeX Rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            },
            chtml: {
                displayAlign: 'left'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .correct-ans { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong-ans { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
        .timer-warning { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Mobile-friendly math rendering */
        mjx-container { 
            max-width: 100% !important; 
            overflow-x: auto !important; 
            overflow-y: hidden !important;
            vertical-align: middle;
        }

        .explanation-box { 
            word-wrap: break-word; 
            overflow-wrap: break-word;
            background-color: #f8fafc; 
            border-left: 4px solid #3b82f6; 
        }

        /* Standard custom scrollbar for better look */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .table-container { border-radius: 1rem; overflow: hidden; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-slate-200 z-50 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="min-w-0">
                <h1 class="text-lg md:text-xl font-bold text-slate-800 truncate">পরিসংখ্যান মাস্টার কুইজ</h1>
                <h1 class="text-lg md:text-xl font-bold text-slate-800 truncate">🎯 আবিদ</h1>
            
                <p class="text-[10px] md:text-xs text-slate-500 font-medium uppercase tracking-wider">সময়: ৩০ মিনিট</p>
            </div>
            <div id="timer" class="bg-slate-100 border border-slate-200 text-slate-700 px-4 py-1.5 rounded-xl font-mono text-xl font-bold">
                30:00
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-6 md:py-8">
        <form id="quiz-form" class="space-y-6 pb-24 tex2jax_process">
            <div id="questions-container" class="space-y-6"></div>
            
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-lg mt-10">
                সাবমিট করুন
            </button>
        </form>
    </main>

    <!-- Modal -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl p-6 md:p-10 max-w-md w-full text-center shadow-2xl">
            <div class="w-24 h-24 rounded-full border-4 border-blue-600 flex items-center justify-center mx-auto mb-4">
                <span id="score-display" class="text-3xl font-bold text-blue-600">0/17</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">ফলাফল কার্ড</h2>
            <p id="performance-msg" class="text-slate-600 mb-6 font-medium"></p>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="closeModal()" class="bg-slate-100 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">রিভিউ</button>
                <button onclick="downloadResults()" class="bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-colors">ডাউনলোড</button>
            </div>
            <button onclick="location.reload()" class="w-full text-blue-600 font-semibold py-2 border border-blue-600 rounded-xl hover:bg-blue-50 transition-colors">আবার চেষ্টা করুন</button>
        </div>
    </div>

    <script>
        const questions = [
            { 
                q: '"পরীক্ষায় প্রাপ্ত নম্বর" ও "জনসংখ্যা"— এগুলো কোন ধরনের চলক?', 
                options: ["বিচ্ছিন্ন চলক", "অবিচ্ছিন্ন চলক"], 
                ans: 0,
                exp: "চলকের মান যখন পূর্ণসংখ্যায় হয় (যেমন: ৫ জন লোক), তাকে বিচ্ছিন্ন চলক বলে।"
            },
            { 
                q: 'নিচের কোনটি অবিচ্ছিন্ন চলক?', 
                options: ["বয়স", "ওজন", "উচ্চতা", "সবগুলো"], 
                ans: 3,
                exp: "অবিচ্ছিন্ন চলকের মান যেকোনো বাস্তব সংখ্যা হতে পারে। বয়স, ওজন ও উচ্চতা সবই অবিচ্ছিন্ন চলক।"
            },
            { 
                q: 'অজীব রেখা সবসময় কেমন হয়?', 
                options: ["ঊর্ধ্বমুখী", "নিম্নমুখী"], 
                ans: 0,
                exp: "যেহেতু অজীব রেখা অঙ্কন করতে ক্রমযোজিত গণসংখ্যা ব্যবহার করা হয়, তাই এটি সবসময় ঊর্ধ্বমুখী হয়।"
            },
            { 
                q: '"ক্রমযোজিত গণসংখ্যা" ও "শ্রেণীর উচ্চসীমা" যথাক্রমে অজীব রেখার কোন অক্ষে থাকে?', 
                options: ["$y$ ও $x$ অক্ষে", "$x$ ও $y$ অক্ষে"], 
                ans: 0,
                exp: "অজীব রেখা অঙ্কনের ক্ষেত্রে $x$ অক্ষে শ্রেণীর উচ্চসীমা এবং $y$ অক্ষে ক্রমযোজিত গণসংখ্যা নেওয়া হয়।"
            },
            { 
                q: 'দেওয়া আছে: $L = 48, F_c = 31, f_m = 25, h = 6, n = 72$। উপাত্তের মধ্যক কত?', 
                options: ["$49.2$", "$50.2$", "$51.2$"], 
                ans: 0,
                exp: "মধ্যক $ = L + (\\frac{n}{2} - F_c) \\times \\frac{h}{f_m}$ <br> $= 48 + (36 - 31) \\times \\frac{6}{25}$ <br> $= 48 + 5 \\times 0.24 = 48 + 1.2 = 49.2$"
            },
            { 
                q: '$2, 10, 5, 1, 0, 7, 3, 4$ উপাত্তের মধ্যক কত?', 
                options: ["$3.5$", "$4.5$"], 
                ans: 0,
                exp: "উপাত্তগুলো সাজালে: $0, 1, 2, 3, 4, 5, 7, 10$। <br> মধ্যক $ = \\frac{3+4}{2} = 3.5$"
            },
            { 
                q: 'প্রচুরক $42.666$, $L = 41$, $f_1 = 5$, $f_2 = 25$ হলে $h$ এর মান কত?', 
                options: ["$10$", "$12$"], 
                ans: 0,
                exp: "প্রচুরক $ = L + \\frac{f_1}{f_1 + f_2} \\times h$ <br> $42.666 = 41 + \\frac{5}{30} \\times h$ <br> $1.666 = \\frac{1}{6} \\times h \\Rightarrow h \\approx 10$"
            },
            { 
                q: 'কেন্দ্রীয় প্রবণতার পরিমাপক কোনটি?', 
                options: ["গড় ও মধ্যক", "মধ্যক ও প্রচুরক", "গড়, মধ্যক ও প্রচুরক"], 
                ans: 2,
                exp: "কেন্দ্রীয় প্রবণতার পরিমাপ হলো গাণিতিক গড়, মধ্যক ও প্রচুরক।"
            },
            { 
                q: 'পরিসর $67$, সর্বোচ্চ মান $85$ হলে সর্বনিম্ন মান কত?', 
                options: ["$19$", "$20$", "$21$"], 
                ans: 0,
                exp: "পরিসর = (সর্বোচ্চ মান - সর্বনিম্ন মান) + $1$ <br> $67 = 85 - x + 1 \\Rightarrow x = 19$"
            },
            { 
                q: 'ধাপ বিচ্যুতি $u_i$ নির্ণয়ের সঠিক সূত্র কোনটি?', 
                options: ["$u_i = \\frac{x_i - a}{h}$", "$u_i = \\frac{x_i + a}{h}$"], 
                ans: 0,
                exp: "ধাপ বিচ্যুতি $u_i =$ (শ্রেণি মধ্যমান - আনুমানিক গড়) $\\div$ শ্রেণি ব্যাপ্তি।"
            },
            { 
                q: 'যোজিত গণসংখ্যা কোনটির জন্য প্রয়োজন?', 
                options: ["মধ্যক ও অজিভরেখা", "গড় ও প্রচুরক"], 
                ans: 0,
                exp: "মধ্যক এবং অজিভরেখা অঙ্কনের জন্য যোজিত গণসংখ্যা প্রয়োজন।"
            },
            { type: "table", content: "নিচের সারণীর আলোকে ১২-১৪ নং প্রশ্নের উত্তর দাও:" },
            { 
                q: 'সারণী অনুযায়ী ৪র্থ শ্রেণির মধ্যমান কত?', 
                options: ["$78$", "$83$"], 
                ans: 0,
                exp: "৪র্থ শ্রেণি $76-80$। মধ্যমান $ = \\frac{76+80}{2} = 78$"
            },
            { 
                q: 'সারণী থেকে প্রাপ্ত তথ্যে মধ্যক কত?', 
                options: ["$73.5$", "$73.7$"], 
                ans: 0,
                exp: "মধ্যক শ্রেণি $71-75$। মান বসিয়ে হিসাব করলে $73.5$ পাওয়া যায়।"
            },
            { 
                q: 'সারণী অনুযায়ী $f_1 + f_2$ এর মান কত?', 
                options: ["$25$", "$27$"], 
                ans: 0,
                exp: "$f_1 = 20-8=12$, $f_2 = 20-7=13$। সুতরাং $12+13=25$।"
            },
            { 
                q: 'কোনো বিন্যস্ত উপাত্তের শ্রেণি সংখ্যা ভগ্নাংশ হলে কোনটি সঠিক?', 
                options: ["পরবর্তী পূর্ণ সংখ্যা গ্রহণ", "পূর্ববর্তী পূর্ণ সংখ্যা গ্রহণ", "দশমিক মান রাখা"], 
                ans: 0,
                exp: "শ্রেণি সংখ্যা সবসময় পূর্ণ সংখ্যা হয়। পরবর্তী পূর্ণ সংখ্যা গ্রহণই নিয়ম।"
            },
            { 
                q: 'গাণিতিক গড় বের করার সময় $A$ দ্বারা কী বোঝানো হয়?', 
                options: ["আয়তন", "আনুমানিক গড়", "আদি মান"], 
                ans: 1,
                exp: "$A$ হলো আনুমানিক গড় বা Assumed Mean."
            },
            { 
                q: 'সংক্ষিপ্ত পদ্ধতিতে গড় নির্ণয়ের সঠিক সূত্র কোনটি?', 
                options: ["$\\bar{x} = A + \\frac{\\sum f_i u_i}{n} \\times h$", "$\\bar{x} = \\frac{\\sum f_i x_i}{n}$"], 
                ans: 0,
                exp: "সঠিক সূত্র: $\\bar{x} = A + \\frac{\\sum f_i u_i}{n} \\times h$"
            }
        ];

        let timeLeft = 30 * 60;
        let userScore = 0;
        let userSelections = {}; // Added robust object to store user selections for download

        const renderQuestions = () => {
            const container = document.getElementById('questions-container');
            let qCounter = 1;

            questions.forEach((item, idx) => {
                if (item.type === "table") {
                    const tableDiv = document.createElement('div');
                    tableDiv.className = "table-container bg-slate-800 text-white p-4 shadow-lg border border-slate-700 overflow-x-auto";
                    tableDiv.innerHTML = `
                        <h3 class="text-sm font-semibold mb-3 text-blue-300 italic min-w-max">${item.content}</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-center border-collapse text-sm min-w-max">
                                <thead>
                                    <tr class="bg-slate-700">
                                        <th class="p-2 border border-slate-600">শ্রেণি</th>
                                        <th class="p-2 border border-slate-600">61-65</th>
                                        <th class="p-2 border border-slate-600">66-70</th>
                                        <th class="p-2 border border-slate-600">71-75</th>
                                        <th class="p-2 border border-slate-600">76-80</th>
                                        <th class="p-2 border border-slate-600">81-85</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="p-2 border border-slate-600 font-bold">গণসংখ্যা</td>
                                        <td class="p-2 border border-slate-600">2</td>
                                        <td class="p-2 border border-slate-600">8</td>
                                        <td class="p-2 border border-slate-600 text-yellow-400 font-bold">20</td>
                                        <td class="p-2 border border-slate-600">7</td>
                                        <td class="p-2 border border-slate-600">3</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    `;
                    container.appendChild(tableDiv);
                } else {
                    const card = document.createElement('div');
                    card.id = `q-card-${idx}`;
                    card.className = "bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 question-card overflow-hidden w-full";
                    card.innerHTML = `
                        <div class="flex gap-3 mb-4">
                            <span class="flex-shrink-0 w-7 h-7 bg-blue-50 text-blue-600 rounded flex items-center justify-center font-bold text-sm mt-0.5">${qCounter++}</span>
                            <div class="text-slate-800 font-semibold leading-relaxed w-full overflow-x-auto">${item.q}</div>
                        </div>
                        <div class="grid gap-2 ml-0 md:ml-10">
                            ${item.options.map((opt, i) => `
                                <label class="flex items-center p-3 rounded-xl border border-slate-100 bg-slate-50 hover:bg-blue-50 cursor-pointer transition-all opt-label" data-q="${idx}" data-opt="${i}">
                                    <input type="radio" name="q${idx}" value="${i}" class="w-4 h-4 text-blue-600 focus:ring-blue-500 flex-shrink-0">
                                    <span class="ml-3 text-slate-700 text-sm overflow-x-auto w-full">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div id="feedback-${idx}" class="mt-4 ml-0 md:ml-10 hidden">
                            <div class="feedback-text font-bold text-sm mb-2"></div>
                            <div class="explanation-box p-3 rounded-lg text-slate-600 text-xs md:text-sm leading-relaxed overflow-x-auto">
                                <span class="font-bold text-blue-600">ব্যাখ্যা:</span><br/> <div class="mt-1">${item.exp}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        };

        const timerInterval = setInterval(() => {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 300) timerEl.classList.add('timer-warning');
            if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
            timeLeft--;
        }, 1000);

        function submitQuiz() {
            clearInterval(timerInterval);
            userScore = 0;
            let totalQuestions = 0;
            const form = document.getElementById('quiz-form');
            const data = new FormData(form);

            questions.forEach((q, idx) => {
                if (q.type === "table") return;
                totalQuestions++;
                
                // Read answer and store securely for download later
                const selected = data.get(`q${idx}`);
                userSelections[idx] = selected; 

                const feedbackContainer = document.getElementById(`feedback-${idx}`);
                const feedbackText = feedbackContainer.querySelector('.feedback-text');
                const qCard = document.getElementById(`q-card-${idx}`);
                
                const labels = qCard.querySelectorAll('.opt-label');
                labels.forEach((label, optIdx) => {
                    if (optIdx === q.ans) label.classList.add('correct-ans');
                    if (selected !== null && parseInt(selected) === optIdx && optIdx !== q.ans) label.classList.add('wrong-ans');
                    label.querySelector('input').disabled = true; // Disable inputs after submission
                });

                feedbackContainer.classList.remove('hidden');
                if (selected !== null && parseInt(selected) === q.ans) {
                    userScore++;
                    feedbackText.innerHTML = "✓ সঠিক উত্তর";
                    feedbackText.className = "feedback-text font-bold text-sm mb-2 text-green-600";
                } else {
                    const cleanAns = q.options[q.ans].replace(/\$/g, '');
                    feedbackText.innerHTML = `✗ ভুল! সঠিক উত্তর: ${cleanAns}`;
                    feedbackText.className = "feedback-text font-bold text-sm mb-2 text-red-600";
                }
            });

            document.getElementById('score-display').textContent = `${userScore}/${totalQuestions}`;
            document.getElementById('performance-msg').textContent = userScore >= (totalQuestions-3) ? "চমৎকার প্রস্তুতি!" : "আরো অনুশীলন প্রয়োজন।";
            document.getElementById('result-modal').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function closeModal() { document.getElementById('result-modal').classList.add('hidden'); window.scrollTo(0, 0); }

        function downloadResults() {
            let content = "পরিসংখ্যান কুইজ ফলাফল ও ব্যাখ্যা\n";
            content += "==============================\n";
            let totalQuestions = 0;
            questions.forEach(q => { if(q.type !== "table") totalQuestions++; });
            content += `মোট স্কোর: ${userScore} / ${totalQuestions}\n\n`;
            
            let currentQ = 1;
            questions.forEach((q, idx) => {
                if (q.type === "table") return;
                
                // Use the stored selections, since inputs are disabled
                const selectedVal = userSelections[idx];
                const userAns = selectedVal !== null ? q.options[parseInt(selectedVal)] : "উত্তর দেওয়া হয়নি";
                
                const cleanQ = q.q.replace(/<[^>]*>?/gm, '').replace(/\$/g, '');
                const cleanU = userAns.replace(/\$/g, '');
                const cleanC = q.options[q.ans].replace(/\$/g, '');
                const cleanExp = q.exp.replace(/<[^>]*>?/gm, ' ').replace(/\$/g, '');
                
                content += `${currentQ++}. ${cleanQ}\nআপনার উত্তর: ${cleanU}\nসঠিক উত্তর: ${cleanC}\nব্যাখ্যা: ${cleanExp}\n\n`;
            });

            // FIX: Added \uFEFF to enforce UTF-8 Encoding. Prevents Bengali gibberish bug in Windows Excel/Notepad.
            const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Statistics_Quiz_Result.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        window.onload = renderQuestions;
        document.getElementById('quiz-form').addEventListener('submit', (e) => {
            e.preventDefault();
            submitQuiz();
        });
    </script>
</body>
</html>
