<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ত্রিকোণমিতি মাস্টার কুইজ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            },
            chtml: {
                displayAlign: 'left'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .correct-ans { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong-ans { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
        .timer-warning { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Mobile-friendly math rendering */
        mjx-container { 
            max-width: 100% !important; 
            overflow-x: auto !important; 
            overflow-y: hidden !important;
            vertical-align: middle;
        }

        .explanation-box { 
            word-wrap: break-word; 
            overflow-wrap: break-word;
            background-color: #f8fafc; 
            border-left: 4px solid #3b82f6; 
        }

        /* Standard custom scrollbar for better look */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-slate-200 z-50 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="min-w-0">
                <h1 class="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-600 truncate">ত্রিকোণমিতি মাস্টার কুইজ</h1>
                <h1>🎯 আবিদ </h1>
                <p class="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-wider">এসএসসি সাধারণ গণিত • সময়: ৩০ মিনিট</p>
            </div>
            <div id="timer" class="bg-slate-100 border border-slate-200 text-slate-800 px-4 py-1.5 rounded-xl font-mono text-xl font-bold shadow-inner">
                30:00
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-6 md:py-8">
        <form id="quiz-form" class="space-y-6 pb-24 tex2jax_process">
            <div id="questions-container" class="space-y-8"></div>
            
            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 text-xl mt-10 tracking-wide border border-blue-500">
                সাবমিট করুন
            </button>
        </form>
    </main>

    <div id="result-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl p-6 md:p-10 max-w-md w-full text-center shadow-2xl border-4 border-blue-500/20">
            <div class="w-28 h-28 rounded-full border-4 border-blue-600 flex items-center justify-center mx-auto mb-4 bg-blue-50 shadow-inner">
                <span id="score-display" class="text-4xl font-black text-blue-700">0/30</span>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">ফলাফল কার্ড</h2>
            <p id="performance-msg" class="text-slate-600 mb-6 font-bold text-lg"></p>
            
            <div class="mb-6">
                <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-800 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors border border-slate-300 shadow-sm text-lg">উত্তরগুলো রিভিউ করুন</button>
            </div>
            <button onclick="location.reload()" class="w-full text-blue-600 font-bold py-3 border-2 border-blue-600 rounded-xl hover:bg-blue-50 transition-colors text-lg">আবার চেষ্টা করুন</button>
        </div>
    </div>

    <script>
        const questions = [
            { 
                q: '$\\frac{\\pi}{4}$ রেডিয়ান সমান কত ডিগ্রি?', 
                options: ["$30^\\circ$", "$45^\\circ$", "$60^\\circ$", "$90^\\circ$"], 
                ans: 1,
                exp: "আমরা জানি, $\\pi$ রেডিয়ান $= 180^\\circ$। সুতরাং $\\frac{\\pi}{4}$ রেডিয়ান $= \\frac{180^\\circ}{4} = 45^\\circ$।"
            },
            { 
                q: '$\\sin 30^\\circ$ এর মান কত?', 
                options: ["$\\frac{1}{2}$", "$\\frac{\\sqrt{3}}{2}$", "$1$", "$\\frac{1}{\\sqrt{2}}$"], 
                ans: 0,
                exp: "ত্রিকোণমিতিক ছক অনুযায়ী $\\sin 30^\\circ$ এর মান $\\frac{1}{2}$।"
            },
            { 
                q: '$\\tan \\theta = \\frac{3}{4}$ হলে $\\cot \\theta$ এর মান কত?', 
                options: ["$\\frac{3}{5}$", "$\\frac{4}{5}$", "$\\frac{4}{3}$", "$\\frac{5}{3}$"], 
                ans: 2,
                exp: "আমরা জানি, $\\cot \\theta = \\frac{1}{\\tan \\theta}$। তাই মান উল্টে যাবে, অর্থাৎ $\\frac{4}{3}$ হবে।"
            },
            { 
                q: '$\\sin^2 \\theta + \\cos^2 \\theta = ?$', 
                options: ["$0$", "$1$", "$-1$", "$2$"], 
                ans: 1,
                exp: "এটি ত্রিকোণমিতির মৌলিক অভেদ (Fundamental Identity)। $\\sin^2 \\theta + \\cos^2 \\theta = 1$"
            },
            { 
                q: '$\\sec^2 \\theta - \\tan^2 \\theta = ?$', 
                options: ["$0$", "$\\frac{1}{2}$", "$1$", "$-1$"], 
                ans: 2,
                exp: "ত্রিকোণমিতির সূত্রানুসারে, $\\sec^2 \\theta - \\tan^2 \\theta = 1$।"
            },
            { 
                q: '$\\operatorname{cosec}^2 \\theta - \\cot^2 \\theta = ?$', 
                options: ["$1$", "$0$", "$\\sin \\theta$", "$\\cos \\theta$"], 
                ans: 0,
                exp: "এটিও একটি মৌলিক অভেদ। $\\operatorname{cosec}^2 \\theta - \\cot^2 \\theta = 1$।"
            },
            { 
                q: '$\\sin 60^\\circ \\times \\cos 30^\\circ$ এর মান কত?', 
                options: ["$\\frac{1}{4}$", "$\\frac{1}{2}$", "$\\frac{\\sqrt{3}}{4}$", "$\\frac{3}{4}$"], 
                ans: 3,
                exp: "$\\sin 60^\\circ = \\frac{\\sqrt{3}}{2}$ এবং $\\cos 30^\\circ = \\frac{\\sqrt{3}}{2}$। গুণ করলে: $\\frac{\\sqrt{3}}{2} \\times \\frac{\\sqrt{3}}{2} = \\frac{3}{4}$।"
            },
            { 
                q: '$\\tan 45^\\circ$ এর মান নিচের কোনটি?', 
                options: ["$0$", "$1$", "$\\sqrt{3}$", "$\\frac{1}{\\sqrt{3}}$"], 
                ans: 1,
                exp: "$\\tan 45^\\circ$ এর মান সর্বদা $1$।"
            },
            { 
                q: 'একটি সমকোণী ত্রিভুজের লম্ব $3$ এবং ভূমি $4$ হলে অতিভুজ কত?', 
                options: ["$5$", "$6$", "$7$", "$25$"], 
                ans: 0,
                exp: "পীথাগোরাসের সূত্রানুসারে, অতিভুজ $= \\sqrt{লম্ব^2 + ভূমি^2} = \\sqrt{3^2 + 4^2} = \\sqrt{9 + 16} = \\sqrt{25} = 5$।"
            },
            { 
                q: '$\\cos 90^\\circ$ এর মান কত?', 
                options: ["$0$", "$1$", "$-1$", "অসংজ্ঞায়িত"], 
                ans: 0,
                exp: "ত্রিকোণমিতিক চার্ট অনুযায়ী $\\cos 90^\\circ = 0$।"
            },
            { 
                q: '$\\sin \\theta = \\frac{\\sqrt{3}}{2}$ হলে $\\theta$ এর মান কত?', 
                options: ["$30^\\circ$", "$45^\\circ$", "$60^\\circ$", "$90^\\circ$"], 
                ans: 2,
                exp: "আমরা জানি $\\sin 60^\\circ = \\frac{\\sqrt{3}}{2}$, সুতরাং $\\theta = 60^\\circ$।"
            },
            { 
                q: '$\\tan \\theta = \\sqrt{3}$ হলে $\\theta$ এর মান কত?', 
                options: ["$30^\\circ$", "$45^\\circ$", "$60^\\circ$", "$90^\\circ$"], 
                ans: 2,
                exp: "$\\tan 60^\\circ = \\sqrt{3}$ হওয়ায় $\\theta = 60^\\circ$।"
            },
            { 
                q: '$\\sec \\theta = 2$ হলে $\\cos \\theta$ এর মান কত?', 
                options: ["$\\frac{1}{2}$", "$\\frac{1}{\\sqrt{2}}$", "$\\sqrt{2}$", "$\\frac{\\sqrt{3}}{2}$"], 
                ans: 0,
                exp: "$\\cos \\theta = \\frac{1}{\\sec \\theta} = \\frac{1}{2}$।"
            },
            { 
                q: '$\\cot 60^\\circ$ এর মান কত?', 
                options: ["$\\sqrt{3}$", "$1$", "$\\frac{1}{\\sqrt{3}}$", "$0$"], 
                ans: 2,
                exp: "$\\cot 60^\\circ = \\frac{1}{\\tan 60^\\circ} = \\frac{1}{\\sqrt{3}}$।"
            },
            { 
                q: 'কোন কোণের জন্য $\\sin \\theta$ এবং $\\cos \\theta$ এর মান সমান?', 
                options: ["$0^\\circ$", "$30^\\circ$", "$45^\\circ$", "$60^\\circ$"], 
                ans: 2,
                exp: "$\\sin 45^\\circ = \\frac{1}{\\sqrt{2}}$ এবং $\\cos 45^\\circ = \\frac{1}{\\sqrt{2}}$। তাই $45^\\circ$ কোণে এরা সমান।"
            },
            { 
                q: '$1 - \\sin^2 45^\\circ$ এর মান কত?', 
                options: ["$0$", "$\\frac{1}{2}$", "$\\frac{1}{\\sqrt{2}}$", "$1$"], 
                ans: 1,
                exp: "$1 - (\\frac{1}{\\sqrt{2}})^2 = 1 - \\frac{1}{2} = \\frac{1}{2}$।"
            },
            { 
                q: '$\\tan \\theta = \\frac{\\sin \\theta}{x}$ হলে $x$ এর মান কী?', 
                options: ["$\\sin \\theta$", "$\\cos \\theta$", "$\\sec \\theta$", "$\\cot \\theta$"], 
                ans: 1,
                exp: "আমরা জানি $\\tan \\theta = \\frac{\\sin \\theta}{\\cos \\theta}$। সুতরাং সমীকরণ তুলনা করলে $x = \\cos \\theta$।"
            },
            { 
                q: '$\\sin A = \\frac{3}{5}$ হলে $\\cos A$ কত?', 
                options: ["$\\frac{4}{5}$", "$\\frac{5}{4}$", "$\\frac{3}{4}$", "$\\frac{4}{3}$"], 
                ans: 0,
                exp: "$\\cos A = \\sqrt{1 - \\sin^2 A} = \\sqrt{1 - (\\frac{3}{5})^2} = \\sqrt{1 - \\frac{9}{25}} = \\sqrt{\\frac{16}{25}} = \\frac{4}{5}$।"
            },
            { 
                q: '$\\tan^2 60^\\circ$ এর মান কত?', 
                options: ["$1$", "$\\sqrt{3}$", "$3$", "$9$"], 
                ans: 2,
                exp: "$\\tan 60^\\circ = \\sqrt{3}$। সুতরাং $(\\sqrt{3})^2 = 3$।"
            },
            { 
                q: 'একটি মিনারের পাদদেশ থেকে $20$ মিটার দূরের একটি স্থানে মিনারের শীর্ষের উন্নতি কোণ $60^\\circ$ হলে, মিনারটির উচ্চতা কত?', 
                options: ["$10\\sqrt{3}$ মি.", "$20\\sqrt{3}$ মি.", "$\\frac{20}{\\sqrt{3}}$ মি.", "$40$ মি."], 
                ans: 1,
                exp: "লম্ব/ভূমি $= \\tan 60^\\circ \\Rightarrow \\frac{h}{20} = \\sqrt{3} \\Rightarrow h = 20\\sqrt{3}$।"
            },
            { 
                q: '$\\frac{1}{\\sqrt{1 - \\sin^2 \\theta}}$ সমান কোনটি?', 
                options: ["$\\sin \\theta$", "$\\cos \\theta$", "$\\sec \\theta$", "$\\operatorname{cosec} \\theta$"], 
                ans: 2,
                exp: "$\\sqrt{1 - \\sin^2 \\theta} = \\cos \\theta$। সুতরাং $\\frac{1}{\\cos \\theta} = \\sec \\theta$।"
            },
            { 
                q: '$\\sin 0^\\circ$ এর মান কত?', 
                options: ["$0$", "$1$", "$-1$", "অসংজ্ঞায়িত"], 
                ans: 0,
                exp: "$\\sin 0^\\circ = 0$।"
            },
            { 
                q: '$\\tan 90^\\circ$ এর মান কত?', 
                options: ["$0$", "$1$", "অসীম/অসংজ্ঞায়িত", "$-1$"], 
                ans: 2,
                exp: "$\\tan 90^\\circ = \\frac{\\sin 90^\\circ}{\\cos 90^\\circ} = \\frac{1}{0}$, যা গণিতে অসংজ্ঞায়িত।"
            },
            { 
                q: '$2 \\sin \\theta = 1$ (যেখানে $\\theta$ সূক্ষ্মকোণ) হলে $\\theta$ এর মান কত?', 
                options: ["$30^\\circ$", "$45^\\circ$", "$60^\\circ$", "$90^\\circ$"], 
                ans: 0,
                exp: "$2 \\sin \\theta = 1 \\Rightarrow \\sin \\theta = \\frac{1}{2}$। আমরা জানি $\\sin 30^\\circ = \\frac{1}{2}$।"
            },
            { 
                q: '$\\sqrt{3} \\tan \\theta - 1 = 0$ হলে $\\theta$ কত?', 
                options: ["$30^\\circ$", "$45^\\circ$", "$60^\\circ$", "$90^\\circ$"], 
                ans: 0,
                exp: "$\\sqrt{3} \\tan \\theta = 1 \\Rightarrow \\tan \\theta = \\frac{1}{\\sqrt{3}}$। সুতরাং $\\theta = 30^\\circ$।"
            },
            { 
                q: '$\\cos \\theta = \\frac{1}{2}$ হলে $\\sin \\theta$ এর মান কত?', 
                options: ["$\\frac{1}{2}$", "$\\frac{1}{\\sqrt{2}}$", "$\\frac{\\sqrt{3}}{2}$", "$1$"], 
                ans: 2,
                exp: "$\\cos \\theta = \\frac{1}{2}$ হলে $\\theta = 60^\\circ$। সুতরাং $\\sin 60^\\circ = \\frac{\\sqrt{3}}{2}$।"
            },
            { 
                q: '$\\frac{\\sin A}{\\cos A} \\times \\cot A = ?$', 
                options: ["$0$", "$1$", "$\\tan^2 A$", "$\\cot^2 A$"], 
                ans: 1,
                exp: "$\\frac{\\sin A}{\\cos A} = \\tan A$। আবার $\\tan A \\times \\cot A = 1$।"
            },
            { 
                q: '$\\sec 45^\\circ$ এর মান কত?', 
                options: ["$1$", "$\\frac{1}{\\sqrt{2}}$", "$\\sqrt{2}$", "$2$"], 
                ans: 2,
                exp: "$\\cos 45^\\circ = \\frac{1}{\\sqrt{2}}$। সুতরাং $\\sec 45^\\circ = \\sqrt{2}$।"
            },
            { 
                q: '$\\cot \\theta = 1$ হলে $\\cos \\theta$ কত?', 
                options: ["$0$", "$\\frac{1}{2}$", "$\\frac{1}{\\sqrt{2}}$", "$1$"], 
                ans: 2,
                exp: "$\\cot \\theta = 1$ হলে $\\theta = 45^\\circ$। সুতরাং $\\cos 45^\\circ = \\frac{1}{\\sqrt{2}}$।"
            },
            { 
                q: '$\\sin(90^\\circ - \\theta)$ সমান কোনটি?', 
                options: ["$\\sin \\theta$", "$\\cos \\theta$", "$-\\sin \\theta$", "$-\\cos \\theta$"], 
                ans: 1,
                exp: "পূরক কোণের সূত্রানুসারে $\\sin(90^\\circ - \\theta) = \\cos \\theta$।"
            }
        ];

        let timeLeft = 30 * 60;
        let userScore = 0;

        const renderQuestions = () => {
            const container = document.getElementById('questions-container');
            let qCounter = 1;

            questions.forEach((item, idx) => {
                const card = document.createElement('div');
                card.id = `q-card-${idx}`;
                card.className = "bg-white p-5 md:p-6 rounded-3xl shadow-md border border-slate-200 question-card w-full transition-shadow hover:shadow-lg";
                
                // Extra designed bold question label
                card.innerHTML = `
                    <div class="flex gap-4 mb-5 items-start">
                        <span class="flex-shrink-0 w-12 h-12 bg-gradient-to-tr from-blue-700 to-cyan-500 text-white rounded-full flex items-center justify-center font-black text-xl shadow-[0_4px_10px_rgba(0,0,0,0.2)] border-2 border-white mt-0.5">${qCounter++}</span>
                        <div class="text-slate-800 font-extrabold text-lg md:text-xl leading-relaxed w-full overflow-x-auto pt-1">${item.q}</div>
                    </div>
                    <div class="grid gap-3 ml-0 md:ml-16">
                        ${item.options.map((opt, i) => `
                            <label class="flex items-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 hover:bg-blue-50 cursor-pointer transition-all opt-label" data-q="${idx}" data-opt="${i}">
                                <input type="radio" name="q${idx}" value="${i}" class="w-5 h-5 text-blue-600 focus:ring-blue-500 flex-shrink-0">
                                <span class="ml-4 text-slate-800 font-semibold text-base overflow-x-auto w-full">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div id="feedback-${idx}" class="mt-5 ml-0 md:ml-16 hidden">
                        <div class="feedback-text font-black text-base mb-2"></div>
                        <div class="explanation-box p-4 rounded-xl text-slate-700 font-medium text-sm md:text-base leading-relaxed overflow-x-auto shadow-sm">
                            <span class="font-black text-blue-700">ব্যাখ্যা:</span><br/> <div class="mt-1">${item.exp}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        };

        const timerInterval = setInterval(() => {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 300) timerEl.classList.add('timer-warning');
            if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
            timeLeft--;
        }, 1000);

        function submitQuiz() {
            clearInterval(timerInterval);
            userScore = 0;
            let totalQuestions = questions.length;
            const form = document.getElementById('quiz-form');
            const data = new FormData(form);

            questions.forEach((q, idx) => {
                const selected = data.get(`q${idx}`);
                const feedbackContainer = document.getElementById(`feedback-${idx}`);
                const feedbackText = feedbackContainer.querySelector('.feedback-text');
                const qCard = document.getElementById(`q-card-${idx}`);
                
                const labels = qCard.querySelectorAll('.opt-label');
                labels.forEach((label, optIdx) => {
                    if (optIdx === q.ans) label.classList.add('correct-ans');
                    if (selected !== null && parseInt(selected) === optIdx && optIdx !== q.ans) label.classList.add('wrong-ans');
                    label.querySelector('input').disabled = true; 
                });

                feedbackContainer.classList.remove('hidden');
                if (selected !== null && parseInt(selected) === q.ans) {
                    userScore++;
                    feedbackText.innerHTML = "✓ সঠিক উত্তর";
                    feedbackText.className = "feedback-text font-black text-base mb-2 text-green-600";
                } else {
                    const cleanAns = q.options[q.ans];
                    feedbackText.innerHTML = `✗ ভুল! সঠিক উত্তর: ${cleanAns}`;
                    feedbackText.className = "feedback-text font-black text-base mb-2 text-red-600";
                }
            });

            document.getElementById('score-display').textContent = `${userScore}/${totalQuestions}`;
            
            let msg = "";
            if(userScore === 30) msg = "অসাধারণ! ১০০% সঠিক!";
            else if(userScore >= 24) msg = "চমৎকার প্রস্তুতি!";
            else if(userScore >= 15) msg = "মোটামুটি ভালো, আরো অনুশীলন করুন।";
            else msg = "ত্রিকোণমিতি অধ্যায়টি পুনরায় পড়ুন।";
            
            document.getElementById('performance-msg').textContent = msg;
            document.getElementById('result-modal').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function closeModal() { 
            document.getElementById('result-modal').classList.add('hidden'); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        window.onload = renderQuestions;
        document.getElementById('quiz-form').addEventListener('submit', (e) => {
            e.preventDefault();
            submitQuiz();
        });
    </script>
</body>
</html>
